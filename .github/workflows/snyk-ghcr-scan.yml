name: Snyk scan using GHCR toolbox

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  snyk-scan:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/icreate1123/security-toolbox:latest
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify tools
        shell: sh
        run: |
          java -version
          mvn -version
          snyk --version
          jq --version

      - name: Run SCA
        id: sca
        continue-on-error: true
        shell: sh
        run: |
          snyk test \
            --file=pom.xml \
            --sarif-file-output=snyk-sca.sarif \
            --severity-threshold=high

      - name: Run SAST + secrets
        id: code
        continue-on-error: true
        shell: sh
        run: |
          snyk code test \
            --sarif-file-output=snyk-code.sarif \
            --severity-threshold=high

      - name: Upload SCA SARIF
        if: always() && hashFiles('snyk-sca.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-sca.sarif

      - name: Upload Code SARIF
        if: always() && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif

      - name: Fail if findings were detected
        if: steps.sca.outcome == 'failure' || steps.code.outcome == 'failure'
        shell: sh
        run: exit 1
