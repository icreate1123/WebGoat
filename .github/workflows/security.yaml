name: Central security scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  sast:
    uses: icreate1123/security-toolbox/.github/workflows/snyk-code-reusable.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit
